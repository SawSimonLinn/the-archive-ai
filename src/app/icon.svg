<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#18181b"/>

  <!-- Stacked document shapes (archive) -->
  <rect x="11" y="13" width="13" height="10" rx="2" fill="#DEB42B" opacity="0.35"/>
  <rect x="9"  y="10" width="13" height="10" rx="2" fill="#DEB42B" opacity="0.6"/>
  <rect x="7"  y="7"  width="13" height="10" rx="2" fill="#DEB42B"/>

  <!-- Text lines on top document -->
  <rect x="9"  y="10" width="7" height="1.5" rx="0.75" fill="#18181b" opacity="0.55"/>
  <rect x="9"  y="13" width="5" height="1.5" rx="0.75" fill="#18181b" opacity="0.55"/>

  <!-- AI node (bottom-right) -->
  <circle cx="23" cy="23" r="5.5" fill="#18181b"/>
  <circle cx="23" cy="23" r="4"   fill="#DEB42B"/>
  <!-- Cross / spark inside node -->
  <line x1="23" y1="20.5" x2="23" y2="25.5" stroke="#18181b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.5" y1="23" x2="25.5" y2="23" stroke="#18181b" stroke-width="1.5" stroke-linecap="round"/>
</svg>
